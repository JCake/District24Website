<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Legacy of District 24</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Gotham, Montserrat, Arial, sans-serif;
            background: linear-gradient(135deg, #3B0104 0%, #781327 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #3B0104 0%, #781327 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.95;
            font-weight: 300;
        }

        .content {
            padding: 50px 40px;
        }

        .section {
            margin-bottom: 45px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1.3rem;
            color: #004165;
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .links-grid {
            display: grid;
            gap: 15px;
        }

        .link-item {
            display: block;
            padding: 18px 24px;
            background: #F5F5F5;
            border-left: 4px solid #004165;
            border-radius: 8px;
            text-decoration: none;
            color: #333;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 1px solid #e9ecef;
        }

        .link-item:hover {
            background: #004165;
            color: white;
            border-left-color: #F2DF74;
            border-bottom-color: #772432;
            transform: translateX(8px);
            box-shadow: 0 8px 16px rgba(0, 65, 101, 0.2);
        }

        .gallery-link {
            background: linear-gradient(135deg, #3B0104 0%, #781327 100%);
            color: white;
            border-left-color: #F2DF74;
            font-size: 1.15rem;
            padding: 24px;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 2px solid #F2DF74;
        }

        .gallery-link:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(120, 19, 39, 0.35);
            background: linear-gradient(135deg, #781327 0%, #3B0104 100%);
        }

        footer {
            text-align: center;
            padding: 30px 40px;
            background: #A9B2B1;
            color: white;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 35px 25px;
            }

            .section-title {
                font-size: 1.15rem;
            }

            .link-item {
                padding: 16px 18px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>The Legacy of District 24</h1>
            <p>Toastmasters International</p>
        </div>

        <div class="content">
            <a href="gallery.html" class="link-item gallery-link">📷 Photo Gallery</a>

            <div class="section">
                <h2 class="section-title">📚 Public Web Pages</h2>
                <div class="links-grid">
                    <a href="member-resources.html" class="link-item">Member Resources</a>
                    <a href="pathways-resources.html" class="link-item">Pathways Resources</a>
                    <a href="speechcraft-program.html" class="link-item">Speechcraft Program</a>
                    <a href="zoom-booking.html" class="link-item">Zoom Booking</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
