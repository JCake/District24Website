<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>District 24 Image Gallery</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #111; color: #eee; }
    header { padding: 24px 16px; text-align: center; background: #151515; border-bottom: 1px solid #333; }
    header h1 { margin: 0; font-size: 2rem; }
    header p { margin: 8px 0 0; color: #aaa; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; padding: 16px; }
    .card { border-radius: 12px; overflow: hidden; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,.45); }
    .card img { width: 100%; display: block; height: 200px; object-fit: cover; }
    .caption { padding: 12px; font-size: 0.85rem; color: #ddd; word-break: break-word; }
    .caption span { display: block; color: #bbb; margin-top: 4px; font-size: 0.8rem; }
    .footer { text-align: center; padding: 14px 16px; color: #888; font-size: 0.9rem; }
    @media (max-width: 580px) { .gallery { padding: 10px; gap: 10px; } .card img { height: 160px; } }
    a { color: inherit; text-decoration: none; }
  </style>
  <script src="images.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.12.0/dist/cdn.min.js"></script>
</head>
<body>
  <header>
    <h1>District 24 Image Gallery</h1>
    <p>Automatically generated gallery from the <code>d24images</code> folder.</p>
  </header>
  <main x-data="galleryApp()" class="gallery">
    <template x-if="loading">
      <div class="footer">Loading images...</div>
    </template>
    <template x-if="error">
      <div class="footer" x-text="error"></div>
    </template>
    <template x-if="!loading && images.length === 0 && !error">
      <div class="footer">No images found in the local manifest. Regenerate images.js if your folder contents changed.</div>
    </template>
    <template x-for="img in images" :key="img">
      <article class="card">
        <a :href="`d24images/${img}`" target="_blank">
          <img :src="`d24images/${img}`" :alt="img">
        </a>
        <div class="caption"><span x-text="img"></span></div>
      </article>
    </template>
  </main>
  <div class="footer" x-show="!loading && images.length > 0 && !error" x-text="`Total images: ${images.length}`"></div>
  <script>
    function galleryApp() {
      const images = window.galleryImages || [];
      return {
        images,
        loading: false,
        error: images.length ? '' : (window.galleryImages ? 'No images were found in the manifest.' : 'Unable to load images manifest. Make sure images.js is present.')
      };
    }
  </script>
</body>
</html>
